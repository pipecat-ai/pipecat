# Template — requires a bot that emits an LLM-generated greeting on connect.
# Won't pass against the passthrough sample_bot.py.
#
# Demonstrates:
#   - An "expect-only" first turn (no user input — wait for the bot to speak)
#   - A judge-evaluated semantic check on the bot's reply

name: bot_greets_then_describes_capabilities

judge_service: ollama
judge_model: llama3:latest

turns:
  - expect:                              # no user input — wait for the bot's opener
      - event: bot_started_speaking
        within_ms: 3000
      - event: bot_stopped_speaking
        within_ms: 8000
        judge: "greets the user and offers to help"

  - user: "what can you do?"
    expect:
      - event: llm_response
        within_ms: 5000
        judge: "describes the agent's capabilities clearly and concisely"
      - event: bot_stopped_speaking
        within_ms: 8000
