name: tts_response_transcribes_spoken_audio

user_audio:
  service: cartesia
  voice: 71a7ad14-091c-4e8e-a314-022ece01c121     # British Reading Lady
  model: sonic-2
  sample_rate: 16000

bot_audio:
  service: whisper
  model: base

judge:
  service: ollama
  model: llama3:latest

turns:
  - user: "what is the capital of France? Answer in one short sentence."
    expect:
      - event: tts_response
        eval: "the response states that Paris is the capital of France"
