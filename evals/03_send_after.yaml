name: chained_turns_with_send_after

user_audio:
  service: cartesia
  voice: 71a7ad14-091c-4e8e-a314-022ece01c121     # British Reading Lady
  model: sonic-2
  sample_rate: 16000

turns:
  - user: "first message"
    expect:
      - event: user_stopped_speaking

  - user: "second message"
    send_after:
      event: user_stopped_speaking
      delay_ms: 2000
    expect:
      - event: user_stopped_speaking
