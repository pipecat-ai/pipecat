name: weather_function_call_with_follow_up

bot_audio: true

judge:
  service: ollama
  model: llama3:latest

turns:
  - user: "what's the weather in Paris?"
    expect:
      - event: function_call
        name: get_current_weather
      - event: llm_response
        eval: "the response describes the current weather conditions in Paris (e.g. temperature, sky conditions, precipitation)"

  - user: "what about Tokyo?"
    expect:
      - event: function_call
        name: get_current_weather
      - event: llm_response
        eval: "the response reports the weather in Tokyo (a temperature and/or sky conditions)"
