# Template — requires a bot with a real LLM. Won't pass against the
# passthrough sample_bot.py.
#
# Demonstrates the judge LLM evaluating natural-language criteria on bot
# output. Assertions target `llm_response.text` — the text the bot produced
# for this turn (populated even when TTS is skipped, since LLMTextFrame
# reaches the eval transport directly).
#
# fast: true pushes LLMConfigureOutputFrame(skip_tts=True) so the LLM
# bypasses TTS entirely (no audio, no TTS API calls) and skips real-time
# text pacing.

name: bot_response_is_helpful

fast: true

judge:
  service: ollama
  model: llama3:latest

turns:
  - user: "what is the capital of France?"
    expect:
      - event: llm_response
        within_ms: 10000
        eval: "the response correctly identifies Paris as the capital of France"

  - user: "and how many people live there?"
    expect:
      - event: llm_response
        within_ms: 10000
        eval: "the response provides a population figure or acknowledges uncertainty"
