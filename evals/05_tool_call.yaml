name: weather_tool_call_with_follow_up

judge:
  service: ollama
  model: llama3:latest

turns:
  - user: "what's the weather in Paris?"
    expect:
      - event: tool_call
        within_ms: 3000
        name: get_weather
        args:
          city: "Paris"
      - event: llm_response
        within_ms: 8000
        eval: "the response describes the current weather conditions in Paris (e.g. temperature, sky conditions, precipitation)"

  - user: "what about Tokyo?"
    expect:
      - event: tool_call
        within_ms: 3000
        name: get_weather
        args:
          city: "Tokyo"
      - event: llm_response
        within_ms: 8000
        eval: "the response describes the current weather conditions in Tokyo without losing the weather context from the prior turn"
