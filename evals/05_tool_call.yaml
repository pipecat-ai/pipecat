name: weather_tool_call_with_follow_up

# Requires a bot with a real LLM and a registered get_weather tool. The
# tool_call name/args come from the RTVI llm-function-call-in-progress message,
# which only includes function_name and arguments when the bot's RTVIObserver
# is configured with function_call_report_level FULL, e.g.:
#
#   PipelineWorker(..., rtvi_observer_params=RTVIObserverParams(
#       function_call_report_level={"*": RTVIFunctionCallReportLevel.FULL}))
#
# With the default (NONE), name/args are omitted and these assertions fail.

judge:
  service: ollama
  model: llama3:latest

turns:
  - user: "what's the weather in Paris?"
    expect:
      - event: tool_call
        within_ms: 3000
        name: get_weather
        args:
          city: "Paris"
      - event: llm_response
        within_ms: 8000
        eval: "the response describes the current weather conditions in Paris (e.g. temperature, sky conditions, precipitation)"

  - user: "what about Tokyo?"
    expect:
      - event: tool_call
        within_ms: 3000
        name: get_weather
        args:
          city: "Tokyo"
      - event: llm_response
        within_ms: 8000
        eval: "the response describes the current weather conditions in Tokyo without losing the weather context from the prior turn"
