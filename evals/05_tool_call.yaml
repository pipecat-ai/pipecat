# Template — requires a bot configured with a `get_weather` tool.
# Won't pass against the passthrough sample_bot.py.
#
# Demonstrates:
#   - Asserting on tool_call.name and tool_call.args across multiple turns
#   - A context-aware follow-up: the bot should understand "what about Tokyo?"
#     means weather in Tokyo without the user repeating the topic
#   - Using `eval:` on `llm_response` to verify the bot's response actually
#     uses the tool result to answer the question

name: weather_tool_call_with_follow_up

judge:
  service: ollama
  model: llama3:latest

turns:
  - user: "what's the weather in Paris?"
    expect:
      - event: tool_call
        within_ms: 3000
        name: get_weather
        args:
          city: "Paris"
      - event: llm_response
        within_ms: 8000
        eval: "the response describes the current weather conditions in Paris (e.g. temperature, sky conditions, precipitation)"

  - user: "what about Tokyo?"
    expect:
      - event: tool_call
        within_ms: 3000
        name: get_weather
        args:
          city: "Tokyo"
      - event: llm_response
        within_ms: 8000
        eval: "the response describes the current weather conditions in Tokyo without losing the weather context from the prior turn"
