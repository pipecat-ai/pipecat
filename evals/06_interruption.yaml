name: barge_in_during_long_response

judge:
  service: ollama
  model: llama3:latest

turns:
  - user: "tell me a long story about Paris"
    expect:
      - event: llm_started
        within_ms: 3000

  - user: "stop, what time is it?"
    send_after:
      event: llm_started
      delay_ms: 500
    expect:
      - event: interruption
        within_ms: 1000
      - event: llm_response
        within_ms: 10000
        eval: "states a time of day rather than continuing the previous topic"
