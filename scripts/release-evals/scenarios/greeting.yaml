name: greeting

# Text modality: the bot greets on connect (a turn with no user input), then we
# ask a follow-up. Tests the on-connect greeting and a basic second turn.

judge:
  eval:
    service: ollama
    model: llama3:latest

turns:
  - expect:
      - event: response
        eval: "greets the user and offers to help"

  - user: "What can you help me with?"
    expect:
      - event: response
        eval: "describes what the assistant can help with"
