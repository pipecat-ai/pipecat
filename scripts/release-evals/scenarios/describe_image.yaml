name: describe_image

# Text modality: the user asks the bot to look at what they're showing. The bot
# calls its vision function (which pushes a UserImageRequestFrame); the eval
# transport serves the image registered for this turn as a UserImageRawFrame.
# Exercises the function-call -> user-image -> describe flow of the *-video bots.

judge:
  eval:
    service: ollama
    model: llama3:latest

turns:
  # Wait for the bot's on-connect greeting before speaking (avoids barging into it).
  - expect:
      - event: response
        eval: "greets the user, introduces itself, or offers to help"

  - user: "What do you see in my camera?"
    image: ../assets/cat.jpg
    expect:
      - event: function_call
        calls:
          - name: fetch_user_image
      - event: response
        eval: "the response says the image shows a cat"
