name: weather_and_restaurant

# Audio modality, end to end: ask for two things at once (weather and a
# restaurant). Tests that the bot handles multiple tool calls in one turn.

user:
  modality: audio
  speech:
    service: cartesia
    voice: 71a7ad14-091c-4e8e-a314-022ece01c121 # British Reading Lady
    model: sonic-2
    sample_rate: 16000

judge:
  modality: audio
  eval:
    service: ollama
    model: llama3:latest
  transcription:
    service: whisper
    model: base

turns:
  - user: "What's the weather in San Francisco, and what's a good restaurant there? Use Fahrenheit."
    expect:
      - event: function_call
        name: get_current_weather
      - event: function_call
        name: get_restaurant_recommendation
      - event: response
        eval: "the response covers the weather in San Francisco (with a temperature in degrees) and recommends a restaurant there"
