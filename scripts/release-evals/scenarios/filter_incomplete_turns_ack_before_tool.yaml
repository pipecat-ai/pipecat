name: filter_incomplete_turns_ack_before_tool

# Audio modality. Regression guard for the turn-completion voiced latch
# (#5063): the bot voices a brief acknowledgement ("Let me look that up, one
# moment.") in the same response as the get_current_weather call, before
# calling it. That acknowledgement carries the ✓ marker; the post-tool
# response must still be spoken. Without the latch reset on function-call
# start, the post-tool text is silently dropped and the bot goes quiet after
# the tool runs — the final `response` expectation then times out.
#
# The harness aggregates response segments, so the interim acknowledgement is
# rolled past (judge says "continue") while waiting for the weather answer.

user: !include user_audio.yaml

judge: !include judge_audio.yaml

turns:
  # Wait for the bot's on-connect greeting before speaking.
  - expect:
      - event: response
        eval: "the bot opens the conversation in some way (a greeting, an introduction, or an offer to help)"

  # One complete question. The bot must acknowledge aloud, call the tool, and
  # then speak the weather.
  - user: "What's the weather in Los Angeles, California?"
    expect:
      # Name only: the stub ignores location and the LLM phrases it
      # unpredictably, so asserting args would be flaky.
      - event: function_call
        calls:
          - name: get_current_weather
      - event: response
        eval: "the response reports the current weather for Los Angeles, mentioning the city and its conditions or temperature"
        within_ms: 45000
