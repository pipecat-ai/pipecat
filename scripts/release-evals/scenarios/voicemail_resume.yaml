name: voicemail_resume

# Roll-your-own voicemail classify-and-route, resume path. The bot reaches a
# voicemail system, the custom VoicemailClassifier drops that turn and leaves a
# message, and then a human picks up and starts talking. The bot must continue a
# live conversation rather than stay in leave-a-message mode.
#
# Audio modality: the classifier keys off the real STT transcription of the first
# turn, so this is tested with synthesized user speech (Kokoro) and the bot's real
# audio transcribed back (Moonshine). The judge LLM is OpenAI (no local Ollama).

user:
  modality: audio
  speech:
    service: kokoro
    voice: af_heart

judge:
  modality: audio
  eval:
    service: openai
    model: gpt-4o-mini
  transcription:
    service: moonshine
    model: small-streaming

turns:
  # Turn 0: the call connects to a voicemail system. The classifier tags it as
  # voicemail, drops the turn so the main LLM stays quiet, and leaves the message.
  - user: "You've reached Jordan's voicemail, please leave a message."
    expect:
      - event: response
        eval: "the bot leaves a voicemail message: it asks the person to call back (for example, gives a callback number) rather than holding a back-and-forth conversation"

  # Turn 1: a human picks up after the message. Sent shortly after the bot
  # finishes its message. The bot should now talk with the caller as a live person.
  - user: "Oh, hello? Sorry, I just got to the phone. This is Jordan speaking, what's this about?"
    send_after:
      event: response
      delay_ms: 1500
    expect:
      - event: response
        eval: "the bot talks with the caller as a live person, responding to Jordan and continuing the conversation (for example about the appointment), instead of only repeating a leave-a-message voicemail prompt"
