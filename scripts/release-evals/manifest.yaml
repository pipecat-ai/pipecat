  #
  # Vision: the bot is handed an image (a cat) on connect via --runner-body and
  # describes it. `runner_body:` is resolved relative to this manifest; relative
  # paths inside it (the image) resolve next to the body file.
  #
  - bot: vision/vision-openai.py
    runner_body: scenarios/vision-cat.json
    scenarios: [vision_describe]
