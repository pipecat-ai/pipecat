    scenarios: [simple_math]
  - agent: voice/voice-aws.py
    scenarios: [simple_math]
  - agent: voice/voice-aws-strands.py
    scenarios: [weather_function_call]
  - agent: voice/voice-azure.py
    scenarios: [simple_math]
  - agent: voice/voice-azure-http.py
    scenarios: [simple_math]
  - agent: voice/voice-camb.py
    scenarios: [simple_math]
  - agent: voice/voice-cartesia.py
