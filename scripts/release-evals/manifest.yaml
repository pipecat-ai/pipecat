  - bot: function-calling/function-calling-aws-video.py
    scenarios: [describe_image]
  - bot: function-calling/function-calling-google-video.py
    scenarios: [describe_image]
  - bot: function-calling/function-calling-moondream-video.py
    scenarios: [describe_image]

  #
  # Vision: the bot is handed an image (a cat) on connect via --runner-body and
  # describes it. `runner_body:` is resolved relative to this manifest; relative
  # paths inside it (the image) resolve next to the body file.
  #
  - bot: vision/vision-openai.py
    runner_body: scenarios/vision-cat.json
    scenarios: [vision_describe]
  - bot: vision/vision-openai-responses.py
    runner_body: scenarios/vision-cat.json
    scenarios: [vision_describe]
  - bot: vision/vision-openai-responses-http.py
    runner_body: scenarios/vision-cat.json
    scenarios: [vision_describe]
  - bot: vision/vision-anthropic.py
    runner_body: scenarios/vision-cat.json
    scenarios: [vision_describe]
  - bot: vision/vision-aws.py
    runner_body: scenarios/vision-cat.json
    scenarios: [vision_describe]
  - bot: vision/vision-gemini-flash.py
    runner_body: scenarios/vision-cat.json
    scenarios: [vision_describe]
  - bot: vision/vision-moondream.py
    runner_body: scenarios/vision-cat.json
    scenarios: [vision_describe]

  #
  # Turn management: the user trails off mid-thought, then completes it after a
  # pause. The bot's incomplete-turn detection must hold the turn open and
  # respond only to the finished thought (anchored on the raw VAD stop signal).
  #
  - bot: turn-management/turn-management-filter-incomplete-turns.py
    scenarios: [filter_incomplete_turns]
  - bot: turn-management/turn-management-filter-incomplete-turns-function-calling.py
    scenarios: [filter_incomplete_turns_function_calling]
  - bot: turn-management/turn-management-filter-incomplete-turns-function-calling.py
    scenarios: [filter_incomplete_turns]

  #
  # DTMF: the caller drives a keypad phone menu (IVR) with DTMF tones instead of
  # speech. The bot's DTMFAggregator turns each keypress into a transcription the
  # LLM responds to, so the harness can assert on the resulting transcription and
  # reply just like a spoken turn.
  #
  - bot: features/features-dtmf-menu.py
    scenarios: [dtmf_menu]

  #
  # Video avatar services
  #
  - bot: video-avatar/video-avatar-tavus-video-service.py
    scenarios: [capital_question]
