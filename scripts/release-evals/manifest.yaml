  - bot: function-calling/function-calling-sarvam.py
    scenarios: [weather_function_call]

  #
  # Function calling with video: the bot calls a vision function that requests a
  # user image; the eval transport serves the scenario's `image:` for that turn.
  #
  - bot: function-calling/function-calling-openai-video.py
    scenarios: [describe_image]
  - bot: function-calling/function-calling-openai-responses-video.py
    scenarios: [describe_image]
  - bot: function-calling/function-calling-openai-responses-video-http.py
    scenarios: [describe_image]
  - bot: function-calling/function-calling-anthropic-video.py
