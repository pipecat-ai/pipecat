# Release evals manifest: which scenarios each agent runs.
# Run with: pipecat eval suite scripts/release-evals/manifest.yaml
#
# Scenarios live in scenarios/<name>.yaml and are reusable, so one shared
# scenario covers many agents.

agents_dir: ../../examples       # agent paths below are relative to this
scenarios_dir: scenarios         # scenario names resolve to <dir>/<name>.yaml
concurrency: 4
spawn: "{python} {agent} -t eval --port {port}"

suite:
  - agent: voice/voice-aicoustics.py
    scenarios: [simple_math]
  - agent: voice/voice-assemblyai.py
    scenarios: [simple_math]
  - agent: voice/voice-assemblyai-turn-detection.py
    scenarios: [simple_math]
