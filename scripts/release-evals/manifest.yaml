# Release evals manifest: which scenarios each bot runs.
# Run with: pipecat eval suite scripts/release-evals/manifest.yaml
#
# Scenarios live in scenarios/<name>.yaml and are reusable, so one shared
# scenario covers many bots.

bots_dir: ../../examples       # bot paths below are relative to this
scenarios_dir: scenarios         # scenario names resolve to <dir>/<name>.yaml
concurrency: 4
runs_dir: test-runs              # logs + recordings -> test-runs/<timestamp>/
record: true                     # set true (or pass -a) to record conversation audio
spawn: "{python} {bot} -t eval --port {port}"

suite:
